<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Retro arcade racing game - Race against AI opponents, use turbo boosts, and drift around corners!">
  <meta name="theme-color" content="#1a1a2e">
  
  <title>RaceRun - Arcade Racing Game</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: Arial, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    /* Loading screen */
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    #loadingScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-title {
      color: #e94560;
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    
    .loading-bar {
      width: 300px;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .loading-text {
      color: #ffffff;
      margin-top: 15px;
      font-size: 14px;
    }
    
    /* Mobile optimizations */
    @media (max-width: 768px) {
      .loading-title {
        font-size: 32px;
      }
      
      .loading-bar {
        width: 200px;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loadingScreen">
    <div class="loading-title">RACERUN</div>
    <div class="loading-bar">
      <div class="loading-progress" id="loadingProgress"></div>
    </div>
    <div class="loading-text">Loading...</div>
  </div>
  
  <!-- Game Canvas -->
  <canvas id="gameCanvas"></canvas>
  
  <!-- Game Script -->
  <script type="module">
    import Game from './src/core/Game.js';
    
    // Show loading progress
    const loadingProgress = document.getElementById('loadingProgress');
    const loadingScreen = document.getElementById('loadingScreen');
    
    let progress = 0;
    const progressInterval = setInterval(() => {
      progress += Math.random() * 20;
      if (progress >= 100) {
        progress = 100;
        clearInterval(progressInterval);
      }
      loadingProgress.style.width = progress + '%';
    }, 200);
    
    // Initialize game when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('gameCanvas');
      
      // Create game instance
      const game = new Game(canvas);
      
      // Simulate asset loading
      setTimeout(() => {
        clearInterval(progressInterval);
        loadingProgress.style.width = '100%';
        
        // Hide loading screen
        setTimeout(() => {
          loadingScreen.classList.add('hidden');
          
          // Initialize and start game
          game.init();
          
          // Remove loading screen from DOM
          setTimeout(() => {
            loadingScreen.remove();
          }, 500);
        }, 300);
      }, 1000);
      
      // Handle visibility change (pause on tab switch)
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          // Game paused automatically when tab is hidden
        } else {
          // Resume audio context if needed
        }
      });
      
      // Handle page unload
      window.addEventListener('beforeunload', () => {
        game.destroy();
      });
    });
    
    // Register service worker for PWA (optional)
    if ('serviceWorker' in navigator) {
      // Uncomment to enable PWA
      // navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
